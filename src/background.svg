<svg width="3440" height="1440" viewBox="0 0 3440 1440" xmlns="http://www.w3.org/2000/svg">
  <rect width="3440" height="1440" fill="#000000"/>

  <!-- The menu stays live in GRUB; this SVG supplies only its clean frame. -->
  <rect
    x="530"
    y="175"
    width="2380"
    height="1089"
    rx="14"
    fill="none"
    stroke="#A4133C"
    stroke-width="2"
  />

  <g
    fill="#A4133C"
